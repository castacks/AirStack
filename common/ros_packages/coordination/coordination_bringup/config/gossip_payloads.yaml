# ─────────────────────────────────────────────────────────────────────────────
# Gossip Payload Topics
# ─────────────────────────────────────────────────────────────────────────────
# List ROS topics here to have them automatically included as typed payloads
# in this robot's PeerProfile and distributed to all peers via gossip.
#
# Each entry requires:
#   topic: topic name — use {robot_name} as a placeholder for the robot namespace
#   type:  fully-qualified ROS message type (package/msg/Type)
#
# If a topic has never published, the payload is silently skipped — the node
# will not crash or block waiting for it.
#
# ── How to add your own payload ──────────────────────────────────────────────
# 1. Add an entry below with the topic + type.
# 2. On the receiving end, call peer_profile.get_payload("<type>") to get the
#    deserialized message, or peer_profile.payload_types() to list what's there.
#
# Example (receiving side in Python):
#   from coordination_bringup.peer_profile import PeerProfile
#   profile = PeerProfile.from_ros_msg(peer_msg)
#   rays = profile.get_payload("visualization_msgs/msg/MarkerArray")
#   if rays is not None:
#       # use rays as a visualization_msgs/msg/MarkerArray
# ─────────────────────────────────────────────────────────────────────────────

payload_topics:

  # ── Rayfronts + Raven ──────────────────────────────────────────────────────
  # Filtered semantic rays (raven_nav) — peer robots consume this as
  # filtered_rays/transposed to avoid revisiting already-explored areas.
  - topic: "/{robot_name}/filtered_rays"
    type: "visualization_msgs/msg/MarkerArray"

  # Raw frontiers (raven_nav) — post-altitude+polygon filter, pre-clustering.
  # Peers cluster the union of (own + peer) raw frontiers to expand their own
  # candidate pool. Each robot still publishes its own filtered viewpoints
  # locally on /<robot>/frontier_viewpoints (NOT shared via gossip).
  - topic: "/{robot_name}/raw_frontiers"
    type: "sensor_msgs/msg/PointCloud2"

  # RGB voxel map (rayfronts) — semantic 3D map for GCS visualization.
  - topic: "/{robot_name}/rayfronts/voxel_rgb"
    type: "sensor_msgs/msg/PointCloud2"

  # Active raven_nav behavior ('frontier'/'ray'/'voxel'/'idle'). Used by peer
  # raven_nav instances to decide whether to treat that robot's waypoint as a
  # frontier "claim" for the multi-robot divergence heuristic.
  - topic: "/{robot_name}/navigation_mode"
    type: "std_msgs/msg/String"

  # Per-target bids from the ray-mode auction. Higher = closer = wins.
  - topic: "/{robot_name}/bids"
    type: "airstack_msgs/msg/BidVector"

  # Shared rays (raven_nav) — FLU local-frame rays so peer drones can bid on
  # the same target the publisher saw. gossip translates x,y,z to global ENU;
  # dx,dy,dz directions and sim_* scores pass through unchanged.
  - topic: "/{robot_name}/shared_rays"
    type: "sensor_msgs/msg/PointCloud2"

  # ── Add more payloads below ────────────────────────────────────────────────
  # - topic: "/{robot_name}/your/topic"
  #   type: "your_msgs/msg/YourType"
