# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set-option -g default-shell /bin/bash

set -g mouse on
set -g @plugin 'noscript/tmux-mighty-scroll'


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom

# Overall bar colours: dark background, light foreground
set -g status-style "bg=#1e2030,fg=#c0caf5"

# Left: Docker container name (ROBOT_NAME env var, falling back to hostname)
set -g status-left-length 50
set -g status-left "\
#[bg=#7aa2f7,fg=#1e2030,bold]  #(printenv ROBOT_NAME 2>/dev/null || hostname) \
#[bg=#1e2030,fg=#7aa2f7,nobold]\
#[fg=#9ece6a]  tmux session "

# Window list (centre)
set -g status-justify centre
set -g window-status-format         "#[fg=#545c7e] #I:#W "
set -g window-status-current-format "#[bg=#ff9e64,fg=#1e2030,bold] #I:#W #[bg=#1e2030,fg=#ff9e64,nobold]"

# Right: keyboard tips
set -g status-right-length 80
set -g status-right "\
#[fg=#545c7e]Detach shell: \
#[fg=#e0af68,bold]Ctrl-b d  \
#[fg=#545c7e,nobold]Copy: \
#[fg=#e0af68,bold]Shift\
#[fg=#545c7e,nobold]+drag, \
#[fg=#e0af68,bold]Ctrl-Shift-C "
# ─────────────────────────────────────────────────────────────────────────────

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
