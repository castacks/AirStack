# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set-option -g default-shell /bin/bash

set -g mouse on
set -g @plugin 'noscript/tmux-mighty-scroll'


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# ── Split Window ──────────────────────────────────────────────────────────────

# Automatically split the window when creating a new session named "bringup" and focus on the first window
# set-hook -g after-new-session 'if -F "#{==:#{session_name},bringup}" "split-window -v -p 20 \; select-pane -t 0"'
set-hook -g after-new-session 'if -F "#{==:#{session_name},bringup}" "split-window -v -p 20 -t bringup:0"'

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom

# Overall bar colours: deep navy background, white foreground
set -g status-style "bg=#0a2540,fg=#ffffff"

# Left: Docker container name (ROBOT_NAME env var, falling back to hostname)
set -g status-left-length 100
set -g status-left "\
#[bg=#06b6d4,fg=#ffffff,bold] Docker container: #(printenv ROBOT_NAME 2>/dev/null || hostname) \
#[bg=#0a2540,fg=#06b6d4,nobold]\
#[fg=#7dd3fc,bold]  tmux session: #S "

# Window list (centre)
set -g status-justify centre
set -g window-status-format         "#[fg=#93c5fd,nobold] #I:#W "
set -g window-status-current-format "#[bg=#06b6d4,fg=#ffffff,bold] #I:#W #[bg=#0a2540,fg=#06b6d4,nobold]"

# Right: keyboard tips
set -g status-right-length 200
set -g status-right "\
#[fg=#ffffff,bold]Detach: \
#[fg=#34d399,bold]Ctrl-b d  \
#[fg=#ffffff,bold]Create Window: \
#[fg=#34d399,bold]Ctrl-b c  \
#[fg=#ffffff,bold]Select Window: \
#[fg=#34d399,bold]Ctrl-b [index]  \
#[fg=#ffffff,bold]Kill Window: \
#[fg=#34d399,bold]Ctrl-b &  \
#[fg=#ffffff,bold]Copy: \
#[fg=#34d399,bold]Shift#[fg=#ffffff,bold]+drag, \
#[fg=#34d399,bold]Ctrl-Shift-C  \
#[fg=#ffffff,bold]Help: \
#[fg=#34d399,bold]Ctrl-b ? "
# ─────────────────────────────────────────────────────────────────────────────

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
