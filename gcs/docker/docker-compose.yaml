services:
  gcs:
    profiles:
      - desktop       # standard sim/dev: GCS alongside robot-desktop (full role)
      - desktop_split # split sim/dev: GCS alongside robot-desktop-onboard + robot-offboard
    extends:
      file: ./gcs-base-docker-compose.yaml
      service: gcs-base
    networks:
      airstack_network:
        # Static IP so other containers can reach the Zenoh router at a known endpoint.
        # Matches ZENOH_ROUTER_IP default in robot/isaac-sim .bashrc files.
        ipv4_address: 172.31.0.10
    ports:
      - 2222:22 # for ssh
      - 8766:8765 # for Foxglove remote display
      - 7447:7447 # zenoh router (rmw_zenohd)

  # ===================================================================================================================
  # for running on a real world laptop on the local network, set network mode to host
  gcs-real:
    profiles:
      - hitl
      - deploy
      - offboard  # field deployment: gcs-real + robot-offboard start together on the ground station
    extends:
      file: ./gcs-base-docker-compose.yaml
      service: gcs-base
    network_mode: host
    volumes:
      - $HOME/bags:/bags
      # TODO: Update rviz config location if needed
      - ../plot:/plot

  # ===================================================================================================================
  # hitl alias for host-network GCS with discovery-server client defaults.
  gcs-hitl:
    profiles: !override
      - hitl
    extends:
      file: ./docker-compose.yaml
      service: gcs-real
