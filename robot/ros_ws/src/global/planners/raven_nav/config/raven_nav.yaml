raven_nav:
  ros__parameters:
    timer_period: 0.5       # seconds between behavior loop iterations
    score_threshold: 0.95   # minimum softmax sim score to consider a ray
    min_altitude_agl: 3.0   # filter rays/frontiers below this altitude (m)
    max_altitude_agl: 15.0  # filter rays/frontiers above this altitude (m)
    # Must match the query order registered in RayFronts (target + background)
    query_labels:
      - 'red building'
      - 'water tower'
      - 'radio tower'
    # Which of the above to actually navigate toward (empty = all query_labels)
    target_labels: []
